<script data-purpose="ui-interactions">
    // Mock interaction for range slider label update
    const spacingSlider = document.querySelector('input[type="range"]');
    const spacingValue = document.querySelector('span.font-mono');
    
    if (spacingSlider && spacingValue) {
      spacingSlider.addEventListener('input', (e) => {
        spacingValue.textContent = `${e.target.value}px`;
        const grid = document.getElementById('canvas-grid-display');
        if (grid) {
          grid.style.gap = `${e.target.value / 4}px`; // Simplified mapping for preview
        }
      });
    }

    // Toggle template selection UI
    const templates = document.querySelectorAll('[data-purpose="section-templates"] button');
    templates.forEach(btn => {
      btn.addEventListener('click', () => {
        templates.forEach(b => b.classList.remove('border-black'));
        templates.forEach(b => b.classList.add('border-transparent'));
        btn.classList.add('border-black');
        btn.classList.remove('border-transparent');
      });
    });
  </script>
