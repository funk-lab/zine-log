upstream zinelog_frontend {
    server 127.0.0.1:4175;
}

server {
    listen 80;
    listen [::]:80;
    server_name zine-log.com www.zine-log.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location / {
        proxy_pass http://zinelog_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/zinelog_access.log;
    error_log  /var/log/nginx/zinelog_error.log;
}
