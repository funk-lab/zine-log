<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zine Log</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Zine Log</p>
          <h1>把生活碎片排成一张像样的设计图</h1>
          <p class="hero-text">
            上传照片，补几句记录，选一个版式，立刻生成可下载的设计稿。这个首版先提供四种风格模板，后续可以继续扩展成更多图文结构与批量导出。
          </p>
          <div class="hero-actions">
            <a href="#studio" class="button primary">开始制作</a>
            <button type="button" class="button secondary" id="random-fill">
              填入示例内容
            </button>
          </div>
        </div>

        <div class="hero-preview">
          <article class="mini-card">
            <span class="mini-label">模板 A</span>
            <strong>L 型回纹</strong>
            <p>适合一张主图 + 短文案</p>
          </article>
          <article class="mini-card">
            <span class="mini-label">模板 B</span>
            <strong>留白日记</strong>
            <p>偏杂志感，适合心情记录</p>
          </article>
          <article class="mini-card accent">
            <span class="mini-label">模板 C</span>
            <strong>拼贴栏位</strong>
            <p>图片主导，适合做海报或封面</p>
          </article>
          <article class="mini-card">
            <span class="mini-label">模板 D</span>
            <strong>照片环</strong>
            <p>方格螺旋照片环，紧密错位排列</p>
          </article>
        </div>
      </header>

      <main class="studio" id="studio">
        <section class="panel controls">
          <div class="panel-head">
            <p class="panel-kicker">编辑内容</p>
            <h2>图文设置</h2>
          </div>

          <label class="field upload-field">
            <span>上传图片</span>
            <input type="file" id="image-upload" accept="image/*" multiple />
          </label>

          <div class="upload-summary">
            <div class="upload-summary-head">
              <span>已选图片</span>
              <strong id="image-count">0 张</strong>
            </div>
            <div class="thumb-strip" id="thumb-strip"></div>
          </div>

          <div class="grid">
            <label class="field">
              <span>标题</span>
              <input
                type="text"
                id="title-input"
                placeholder="例如：春天的午后散步"
              />
            </label>

            <label class="field">
              <span>副标题</span>
              <input
                type="text"
                id="meta-input"
                placeholder="例如：2026.03.17 · 上海"
              />
            </label>
          </div>

          <label class="field">
            <span>正文</span>
            <textarea
              id="body-input"
              rows="6"
              placeholder="写几句生活记录，也可以留空，只保留图片。"
            ></textarea>
          </label>

          <div class="grid">
            <label class="field">
              <span>主题色</span>
              <input type="color" id="accent-input" value="#b36a3c" />
            </label>

            <label class="field">
              <span>模板</span>
              <select id="template-select">
                <option value="l-shape">L 型回纹</option>
                <option value="editorial">留白日记</option>
                <option value="poster">拼贴栏位</option>
                <option value="l-style">照片环</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span class="range-label">
              <span>环阵大小（L Style）</span>
              <strong id="ring-size-value">100%</strong>
            </span>
            <input type="range" id="ring-size-input" min="80" max="125" value="100" />
          </label>

          <div class="template-switcher" id="template-buttons">
            <button type="button" class="template-pill active" data-template="l-shape">
              L 型回纹
            </button>
            <button type="button" class="template-pill" data-template="editorial">
              留白日记
            </button>
            <button type="button" class="template-pill" data-template="poster">
              拼贴栏位
            </button>
            <button type="button" class="template-pill" data-template="l-style">
              照片环
            </button>
          </div>

          <div class="actions">
            <button type="button" class="button ghost" id="print-pdf">
              下载 PDF
            </button>
            <button type="button" class="button primary" id="download-png">
              下载 PNG
            </button>
            <button type="button" class="button secondary" id="download-svg">
              下载 SVG
            </button>
          </div>
        </section>

        <section class="panel preview-panel">
          <div class="panel-head">
            <p class="panel-kicker">实时预览</p>
            <h2>设计画布</h2>
          </div>

          <div class="preview-stage">
            <div class="artboard-frame">
              <div id="artboard" aria-live="polite"></div>
            </div>
          </div>

          <p class="preview-note">
            当前导出为前端本地生成。PNG、SVG 和 PDF 都可直接下载。
          </p>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
